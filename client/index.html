<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ArcadeHub</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style type="text/tailwindcss">
      @theme {
        --color-arcade-bg: #0a0a0a;
        --color-arcade-purple: #b026ff;
        --color-arcade-pink: #ff2a85;
        --color-arcade-cyan: #00f0ff;
        --color-arcade-green: #39ff14;
        --color-arcade-yellow: #fbff00;
        --font-retro: "Press Start 2P", cursive;
        --font-modern: "Inter", sans-serif;
      }

      body {
        @apply bg-arcade-bg text-white font-modern antialiased;
      }

      .text-shadow-neon {
        text-shadow: 0 0 5px var(--color-arcade-purple), 0 0 20px var(--color-arcade-purple);
      }
      .box-shadow-neon {
        box-shadow: 0 0 10px var(--color-arcade-cyan), inset 0 0 10px var(--color-arcade-cyan);
      }
      .glassmorphism {
        @apply bg-white/5 backdrop-blur-md border border-white/10 rounded-xl shadow-lg;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
